<div id="portfolio" class="portfolio-section">

    <img src="assets/vector.png" class="decorate-img-portfolio-1">
    <img src="assets/green-shadow.png" class="decorate-image-portfolio-2">

    <div class="portfolio">
        <div class="short-line"></div>
        <h1>Portfolio</h1>
        <div class="long-line"></div>
    </div>

    <span class="description">
        {{ "Portfolio" | translate }}
    </span>

    <div class="projects-grid">
        <div class="project-card"
             *ngFor="let development of developments; let i = index"
             data-aos="fade-up"
             data-aos-duration="800"
             [attr.data-aos-delay]="i * 150">

            <div class="card-image">
                <img [src]="development.img" [alt]="development.title">
            </div>

            <div class="card-body">
                <span class="project-number">0{{ i + 1 }}</span>
                <h3>{{ development.title }}</h3>
                <span class="skills">{{ development.skills }}</span>
                <span class="development-description">
                    {{ development.description | translate }}
                </span>
                <div class="btn-section">
                    <button (click)="sendToUrl(development.url)" class="live-test">
                        {{ "Live Test" | translate }}
                    </button>
                    <button (click)="sendToUrl(development.github)" class="github">
                        Github
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>
